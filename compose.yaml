services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    image: sentiment-analysis-api:1.0.0
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant

volumes:
  qdrant_data:
